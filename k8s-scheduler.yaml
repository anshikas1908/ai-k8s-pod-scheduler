apiVersion: apps/v1
kind: Deployment
metadata:
  # Name of our AI scheduler deployment
  name: ai-pod-scheduler
  labels:
    app: ai-pod-scheduler

spec:
  # Running 1 instance of our scheduler
  replicas: 1
  selector:
    matchLabels:
      app: ai-pod-scheduler

  template:
    metadata:
      labels:
        app: ai-pod-scheduler

    spec:
      containers:
        # ─── CONTAINER CONFIG ─────────────────────────────
        # Our AI scheduler container built from Dockerfile
        - name: ai-scheduler
          image: ai-pod-scheduler:latest

          # Port the Gradio app runs on
          ports:
            - containerPort: 7860

          # ─── RESOURCE LIMITS ────────────────────────────
          # Limiting CPU and Memory usage of our container
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # ─── ENVIRONMENT VARIABLES ──────────────────────
          # Secure coding — no hardcoded values in code
          env:
            - name: MODEL_PATH
              value: "/app/model.pkl"
            - name: APP_PORT
              value: "7860"

---
# ─── SERVICE CONFIG ───────────────────────────────────────
# Exposes our AI scheduler to the Kubernetes cluster network
apiVersion: v1
kind: Service
metadata:
  name: ai-pod-scheduler-service
spec:
  selector:
    app: ai-pod-scheduler

  ports:
    # Mapping container port 7860 to external port 80
    - protocol: TCP
      port: 80
      targetPort: 7860

  # Makes the service accessible outside the cluster
  type: LoadBalancer
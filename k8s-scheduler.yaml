apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-pod-scheduler
  labels:
    app: ai-pod-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-pod-scheduler
  template:
    metadata:
      labels:
        app: ai-pod-scheduler
    spec:
      containers:
        - name: ai-scheduler
          image: ai-scheduler:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_PATH
              value: "model.pkl"
            - name: APP_PORT
              value: "8000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-pod-scheduler-service
spec:
  selector:
    app: ai-pod-scheduler
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
